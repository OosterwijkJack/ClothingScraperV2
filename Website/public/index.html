<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clothes Gallery</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        .card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }

        .card-image {
            width: 100%;
            height: 200px;
            overflow: hidden;
            position: relative;
            cursor: pointer;
            flex-shrink: 0;
        }

        .card-image img {
            width: 100%;
            height: 100%;
            object-fit: fill;
            transition: transform 0.3s ease;
        }

        .card-image:hover img {
            transform: scale(1.05);
        }

        .card-content {
            padding: 15px;
            background: white;
            flex-grow: 1;
        }

        .label {
            font-size: 0.75rem;
            font-weight: 600;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 5px;
        }

        .price {
            font-size: 1.25rem;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 15px;
        }

        .description {
            color: #555;
            line-height: 1.5;
            font-size: 0.9rem;
        }

        .loading {
            text-align: center;
            color: white;
            font-size: 1.2rem;
            padding: 40px;
        }

        .error {
            text-align: center;
            color: #ff6b6b;
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin: 20px auto;
            max-width: 500px;
        }
    </style>
</head>
<body>
    <button id="kill">Set All Seen</button>
    <div></div>
    <div></div>

    <select id="brand-select">
        <option>Select brand to start</option>
    </select>
    <button id="brand-index">Enter</button>
    
    <div class="container">
        <h1>Clothes Gallery</h1>
        
        <div id="gallery" class="gallery">
            <div class="loading">Loading clothes...</div>
        </div>
    </div>
   
    <script src="page.js">
    </script>
</body>
</html>
